---
version: 2
plan:
  project-key: AJL
  key: FLTRDWNLBUILD
  name: filters-downloader - build release

stages:
  - Build:
      manual: false
      final: false
      jobs:
        - Build

Build:
  key: BUILD
  other:
    clean-working-dir: true
  tasks:
    - checkout:
        force-clean-build: true
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -x
            set -e

            # Fix mixed logs
            exec 2>&1

            docker build \
              --file Dockerfile \
              --progress plain \
              --target build-output \
              --output type=local,dest=output \
              .
    - inject-variables:
        file: output/artifacts/build.txt
        scope: RESULT
        namespace: inject
    - any-task:
        plugin-key: com.atlassian.bamboo.plugins.vcs:task.vcs.tagging
        configuration:
          selectedRepository: defaultRepository
          tagName: v${bamboo.inject.version}
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - ./bamboo-specs/scripts/cleanup.sh "output/artifacts/filters-downloader.tgz"
  requirements:
    - extension: 'true'
  artifacts:
    - name: filters-downloader.tgz
      location: output/artifacts
      pattern: filters-downloader.tgz
      shared: true
      required: true
triggers: []

branches:
  create: manually
  delete: never
  link-to-jira: true

labels: []
other:
  concurrent-build-plugin: system-default
